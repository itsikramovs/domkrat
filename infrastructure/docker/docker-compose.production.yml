# Domkrat production infrastructure.
# Только инфра-сервисы; node-приложения запускаются через systemd / PM2 на хосте.
#
# Все секреты подгружаются из файла, см. ниже env_file.
# Пример: /etc/domkrat/infra.env
#   POSTGRES_PASSWORD=<strong>
#   REDIS_PASSWORD=<strong>
#   MINIO_ROOT_PASSWORD=<strong>
#   MEILI_MASTER_KEY=<64-char>
#
# Запуск: docker compose -f docker-compose.production.yml --env-file /etc/domkrat/infra.env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: domkrat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: domkrat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: domkrat
      PGDATA: /var/lib/postgresql/data/pgdata
    # Внутренний доступ — НЕ публикуем порт наружу (привязываем к localhost)
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U domkrat -d domkrat']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: domkrat-redis
    restart: unless-stopped
    command:
      - 'redis-server'
      - '--requirepass'
      - '${REDIS_PASSWORD}'
      - '--appendonly'
      - 'yes'
      - '--maxmemory'
      - '512mb'
      - '--maxmemory-policy'
      - 'allkeys-lru'
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: domkrat-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_LOG_LEVEL: WARN
    ports:
      - '127.0.0.1:7700:7700'
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: domkrat-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # API на 9000 за обратным прокси (cdn.domkrat.uz), console на 9001 только локально
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
